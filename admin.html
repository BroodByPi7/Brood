<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brood — Admin</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="admin.css">
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script defer src="firebase.js"></script>
  <script defer src="admin.js"></script>
</head>
<body>
  <header class="admin-header">
    <div class="admin-header-inner">
      <a href="admin.html" class="admin-logo">Brood <span>Admin</span></a>
      <div class="admin-header-links">
        <a href="index.html" class="admin-back-link">&larr; Main site</a>
      </div>
      <nav class="admin-nav">
        <button class="admin-nav-btn is-active" data-tab="orders">Orders</button>
        <button class="admin-nav-btn" data-tab="pricing">Pricing</button>
        <button class="admin-nav-btn" data-tab="limits">Limits</button>
      </nav>
    </div>
  </header>

  <div class="admin-login" id="admin-login">
    <form class="admin-login-form" id="admin-login-form">
      <h2>Admin sign in</h2>
      <input type="email" id="admin-email" placeholder="Email" required>
      <input type="password" id="admin-password" placeholder="Password" required>
      <button type="submit">Sign in</button>
      <p class="auth-error" id="admin-auth-error"></p>
    </form>
  </div>

  <main class="admin-main" id="admin-main" style="display:none">
    <!-- Orders tab -->
    <section class="admin-tab is-active" id="tab-orders">
      <div class="admin-tab-head">
        <h2>Orders</h2>
        <div class="admin-filters">
          <select id="order-filter-status">
            <option value="all">All</option>
            <option value="pending">Pending</option>
            <option value="confirmed">Confirmed</option>
            <option value="declined">Declined</option>
          </select>
          <input type="date" id="order-filter-date">
        </div>
      </div>
      <div class="orders-list" id="orders-list">
        <p class="admin-empty">No orders yet.</p>
      </div>
    </section>

    <!-- Pricing tab -->
    <section class="admin-tab" id="tab-pricing">
      <div class="admin-tab-head">
        <h2>Item pricing</h2>
        <p class="admin-limits-note">Set prices per item. Prices are in USD (base currency).</p>
      </div>
      <div class="admin-pricing-form">
        <div id="pricing-items">
          <!-- Filled by JS -->
        </div>
        <button class="admin-save-limits" type="button" id="save-pricing">Save prices</button>
      </div>
    </section>

    <!-- Limits tab -->
    <section class="admin-tab" id="tab-limits">
      <div class="admin-tab-head">
        <h2>Daily limits</h2>
        <p class="admin-limits-note">Set maximum quantities per day. The customer calendar greys out days that are full.</p>
      </div>

      <div class="admin-limits-form">
        <div class="admin-limit-row">
          <label for="limit-perday">Max items per day (total)</label>
          <input type="number" id="limit-perday" min="0" value="50">
        </div>

        <h3>Per-item maximums</h3>
        <p class="admin-limits-note">Leave blank or 0 for no limit.</p>
        <div id="limit-items">
          <!-- Filled by JS -->
        </div>

        <button class="admin-save-limits" type="button">Save limits</button>
      </div>
    </section>
  </main>
</body>
</html>
